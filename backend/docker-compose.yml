services:
  db:
    image: mysql:9.0
    container_name: mysql_sanos_y_salvos
    environment:
      MYSQL_DATABASE: sanos_y_salvos
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

#<---- AÑADIMOS EL SERVICIO DE MASCOTAS---->
# IMPORTANTE: Asegurarse que la ruta en build apunte a la carpeta correcta donde está el Dockerfile de mascotas.
# IMPORTANTE: Asegurarse de que el puerto 8080 no esté siendo usado por otro servicio en la máquina.
# Se puede utilizar esta misma configuración para los otros microservicios, solo cambiando el nombre del servicio, el puerto y la ruta del build.
  mascotas-service:
    build: ./mascotas  # <--- IMPORTANTE: Agregamos la carpeta mascotas
    container_name: ms_mascotas
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/sanos_y_salvos?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update